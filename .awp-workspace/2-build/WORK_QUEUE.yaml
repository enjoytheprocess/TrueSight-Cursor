# Work Queue — canonical execution table for admitted tasks.
# Edit this file directly or ask your agent to update it.
# Field definitions: docs/core/glossary.md | Workflow rules: docs/core/workflow-reference.md
# Build agents: docs/design/build-agent-loop.md — one task, commit, re-scan when deps accepted.
#
# phase:               design | build | verify | sync
# mode:                sequential | parallel
# status:              todo | in_progress | blocked | awaiting_human_review | accepted | done | needs_rework
# build_dependencies:  comma-separated task IDs or "none"
# design_dependencies: comma-separated task IDs or "none"
# spec_link:           repo-relative path to the design spec for this task
# advisor_status:        not_required | pending | complete
# advisor_track:  none | security | experiment | incident | data_migration | api_contract
# quality_requirements: list of QR IDs from QUALITY_REQUIREMENTS.yaml that apply to this task
# decision_links:      repo-relative paths to ADRs in docs/design/decisions/ that shaped this task

