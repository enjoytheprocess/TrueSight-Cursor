  - id: DI-004
    type: gap
    status: addressed
    resolution_type: incorporated
    feature_id: FEAT-SES-001
    source_ref: GD-005
    priority: P0
    summary: "CRITICAL — Recipe accept idempotency (OQ-038 / GD-005)"
    detail: >
      Duplicate POST /api/recipe-sessions double-deducts inventory. Design must specify
      idempotency key or natural key policy before re-admit BUILD-SES-001.
    addressed_at: "2026-05-24"
    resolution_note: >
      Reported "double deduct" was required quantity vs stock UX (e.g. 2 eggs/serving), not
      duplicate POST. FEAT-REC-001 recipe card (required vs in-stock, canCook) addresses user
      trust. Server idempotency (OQ-038) deferred for V1; optional UI click guard only.

