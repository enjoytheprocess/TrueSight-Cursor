# Canonical register schema versions.
# Each entry declares the schema_version a live register must be at for the
# current template release. When a release adds, removes, or renames fields in
# a register, bump its version here and add a schema_change block to
# upgrade-notes.md describing the migration.
#
# Sideload agents: after applying schema_change migrations, verify that each
# register's schema_version matches the expected value below.

