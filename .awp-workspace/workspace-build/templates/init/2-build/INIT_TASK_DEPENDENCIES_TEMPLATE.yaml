# Task Dependencies — canonical dependency map for task execution.
# Edit this file directly or ask your agent to update it.
# Workflow rules: docs/core/workflow-reference.md
#
# build_depends_on:  task only needs upstream implementation output to exist
# design_depends_on: task must wait for verified upstream learning and a design refresh
# unblocks:          tasks that become executable after this task resolves its dependency
# Use "none" for empty fields. Comma-separate multiple task IDs.
#
# Every task in WORK_QUEUE.yaml must have a corresponding entry here.

tasks:
  - id: __TASK_ID__
    build_depends_on: none
    design_depends_on: none
    unblocks: none
    notes: "seeded by make init"
