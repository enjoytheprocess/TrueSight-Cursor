# Feature Registry — permanent identity record for all features in this workspace.
# Edit this file directly or ask your agent to update it.
# Workflow rules: docs/core/workflow-reference.md
#
# This file is the canonical source of truth for feature identities.
# All other registers (DESIGN_STATES, WORK_QUEUE, TRACEABILITY_MATRIX, etc.)
# reference features by the id values defined here.
# title is denormalized into DESIGN_STATES for readability — update both when renaming a feature.
#
# Add a row here when a feature enters the system (from Design or Ideation).
# Rows are never removed — this is a permanent audit trail of every feature
# ever admitted to the project.

schema_version: 1

features: []  # add your first feature when design begins
