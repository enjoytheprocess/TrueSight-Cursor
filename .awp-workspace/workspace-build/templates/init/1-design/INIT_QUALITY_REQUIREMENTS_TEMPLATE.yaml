# Quality Requirements Register — cross-cutting and nonfunctional requirements.
# Edit this file directly or ask your agent to update it.
# Workflow rules: docs/core/workflow-reference.md
#
# enforcement:  sustained | per_task | milestone
#   sustained  — permanent standard; applies to all tasks implicitly; never globally satisfied;
#                link in TASK_READINESS is not needed — agents check the full sustained list at build start
#   per_task   — applies each time a task of the relevant type occurs;
#                link via quality_requirements in 1-design/TASK_READINESS.yaml
#   milestone  — must be satisfied before a specific event or deployment gate;
#                link via quality_requirements in TASK_READINESS for the milestone task
#
# disposition (active file): active | deferred
# disposition (done file):   satisfied | superseded | dropped
#
# Terminal dispositions move to 1-design/archive/QUALITY_REQUIREMENTS.yaml: satisfied | superseded | dropped
# Non-terminal stay here:                                        active | deferred
#
# Deferred requirements stay in the active file — they still need follow-up.
# Record the linked TMP-* or follow-up task ID in the notes field.

schema_version: 1

requirements:
  - id: QR-OBS-001
    recorded_on: "—"
    origin: template
    added_by: team
    scope: __PROJECT_NAME__
    category: observability
    enforcement: sustained
    requirement: "Structured logs emitted at key operations, including request IDs or trace IDs"
    applies_to: "all components"
    validation: "Logs searchable by trace ID in observability stack"
    disposition: active
    notes: "Adapt log format to your stack"

  - id: QR-REL-001
    recorded_on: "—"
    origin: template
    added_by: team
    scope: __PROJECT_NAME__
    category: reliability
    enforcement: per_task
    requirement: "Timeout and retry policy defined for all external calls"
    applies_to: "all components"
    validation: "Policy documented in component README; validated in integration tests"
    disposition: active
    notes: "Prevents cascading failures on dependency degradation; link in TASK_READINESS for tasks adding external calls"

  - id: QR-PERF-001
    recorded_on: "—"
    origin: template
    added_by: team
    scope: __PROJECT_NAME__
    category: performance
    enforcement: milestone
    requirement: "Availability and latency SLO targets defined before first production deployment"
    applies_to: __PROJECT_NAME__
    validation: "Targets recorded in component READMEs; baseline captured in load test"
    disposition: active
    notes: "Fill in concrete numbers before going live; link in TASK_READINESS for the pre-production milestone task"

  - id: QR-SEC-001
    recorded_on: "—"
    origin: template
    added_by: team
    scope: __PROJECT_NAME__
    category: security
    enforcement: milestone
    requirement: "Authentication and authorisation model documented for each external-facing interface"
    applies_to: "all components"
    validation: "Auth model in design docs or ADRs; reviewed via security advisor track"
    disposition: active
    notes: "Use advisor_track: security for tasks that change auth; link in TASK_READINESS for auth design tasks"

  - id: QR-SEC-002
    recorded_on: "—"
    origin: template
    added_by: team
    scope: __PROJECT_NAME__
    category: security
    enforcement: sustained
    requirement: "Secrets and credentials are never hardcoded; all are injected via environment variables"
    applies_to: "all components"
    validation: "No secrets in VCS; env vars listed in component README"
    disposition: active
    notes: ""

  - id: QR-TEST-001
    recorded_on: "—"
    origin: template
    added_by: team
    scope: __PROJECT_NAME__
    category: testability
    enforcement: milestone
    requirement: "Unit, integration, and e2e test layers defined with clear scope boundaries"
    applies_to: "all components"
    validation: "Test types and scope documented in component AGENTS.md Verify section"
    disposition: active
    notes: "Define the split before build begins to avoid test gap; link in TASK_READINESS for the first build-setup task"

  - id: QR-DATA-001
    recorded_on: "—"
    origin: template
    added_by: team
    scope: __PROJECT_NAME__
    category: data-safety
    enforcement: per_task
    requirement: "All schema changes have a documented, tested rollback path"
    applies_to: "all components"
    validation: "Rollback demonstrated; data_migration advisor record approved where applicable"
    disposition: active
    notes: "Use advisor_track: data_migration for schema-changing tasks; link in TASK_READINESS for each schema-change task"
