# readiness:            needs_detail | ready_for_build
# advisor_status:         not_required | pending | complete
#   approved = agent completed the specialist analysis and recorded it in the backing file under 3-verify/
# irg:                  S/A/I/R/V each 0-2; total >= 8 with A=2 and I=2 to reach ready_for_build
