# Gaps and Deviations Staging — unresolved design gaps and deviations
# collected during the Build/Verify loop, passed to Sync for triage.
# Edit this file directly or ask your agent to update it.
# Workflow rules: docs/core/workflow-reference.md
#
# type: gap | deviation
# source: agent | human_feedback
# status: open | promoted_to_sync | resolved_in_loop
#
# NOTE: All entries must pass to Sync — do not delete entries resolved in-loop.

schema_version: 1

entries:
  - id: GD-003
    feature_id: none
    type: gap
    summary: "V1 identity missing — project brief lists sign-up/login; only X-TrueSight-User dev header"
    detail: >
      docs/product/project-brief.md lists user sign-up/login in V1 scope. Implementation uses
      HeaderCurrentUser with optional X-TrueSight-User defaulting to demo-user. Blocks production
      isolation and advisor security track closure.
    source: human_feedback
    source_ref: FM-001
    discovered_in_task: SETUP-001
    status: open
    severity: high

  - id: GD-004
    feature_id: FEAT-REC-001
    type: deviation
    summary: "Recipe provider hardcoded — config keys and ADR acceptance criterion not met"
    detail: >
      StaticRecipeProvider registered in Program.cs with no appsettings selection or documented
      env keys for Spoonacular/Edamam/stub per FEAT-REC-001 and ADR-20260523-02.
    source: agent
    source_ref: verify-2026-05-24
    discovered_in_task: BUILD-REC-001
    status: open
    severity: medium

  - id: GD-005
    feature_id: FEAT-SES-001
    type: gap
    summary: "Recipe accept is not idempotent — duplicate POST double-deducts inventory"
    detail: >
      FEAT-SES-001 leaves idempotency TBD (OQ-038). AcceptRecipe creates a new session and
      deducts on every POST with no client idempotency key or duplicate detection.
    source: agent
    source_ref: verify-2026-05-24
    discovered_in_task: BUILD-SES-001
    status: open
    severity: high

  - id: GD-006
    feature_id: FEAT-INV-001
    type: gap
    summary: "IngredientCatalog entity absent — free-text names only"
    detail: >
      Spec and domain model reference IngredientCatalog; implementation uses inline name +
      NormalizedName only. Impacts provider mapping and catalog-vs-inline TBD (OQ-030).
    source: agent
    source_ref: verify-2026-05-24
    discovered_in_task: BUILD-INV-001
    status: open
    severity: medium

  - id: GD-007
    feature_id: FEAT-INV-001
    type: deviation
    summary: "Inventory API polish gaps — no PATCH, 404 without problem details, no pagination"
    detail: >
      Spec allows PATCH; only PUT mapped. Missing items return empty 404. List is unpaginated.
      Cross-user isolation not covered by automated tests.
    source: agent
    source_ref: verify-2026-05-24
    discovered_in_task: BUILD-INV-001
    status: open
    severity: low

  - id: GD-008
    feature_id: FEAT-REC-001
    type: gap
    summary: "No automated tests for recipe suggestions or recipe detail endpoints"
    detail: >
      Inventory and session flows have integration tests; ListRecipeSuggestions and GetRecipe
      have none. Verify validation field cites curl smoke only.
    source: agent
    source_ref: verify-2026-05-24
    discovered_in_task: BUILD-REC-001
    status: open
    severity: medium
