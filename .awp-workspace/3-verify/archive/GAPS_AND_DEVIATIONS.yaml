      completing the IRG rubric (S/A/I/R/V with A=2 and I=2). TASK_READINESS shows totals >= 8
      but no admission notes documenting unknowns closed. Retrospective IRG audit required before
      accepting BUILD-* tasks.
    source: human_feedback
    source_ref: FM-001
    discovered_in_task: BUILD-INV-001
    status: promoted_to_sync
    severity: high
    resolution_note: >
      Fast Sync 2026-05-24: promoted to DESIGN_INPUTS DI-001 for Design-cycle IRG re-score;
