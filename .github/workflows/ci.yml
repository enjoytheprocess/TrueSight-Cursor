name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore backend/MyApp.sln

      - name: Build
        run: dotnet build backend/MyApp.sln --no-restore

      - name: Test
        run: dotnet test backend/MyApp.sln --no-build --verbosity normal

      - name: Check vulnerable NuGet packages
        run: |
          dotnet list backend/MyApp.sln package --vulnerable --include-transitive \
            | tee vulnerable.txt
          if grep -q "has the following vulnerable packages" vulnerable.txt; then
            echo "Vulnerable NuGet packages found."
            exit 1
          fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
